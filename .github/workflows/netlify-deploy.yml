name: Validate and Deploy

on:
  push:
    branches:
      - master
      - "version/**"
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Build application
        run: npm run build

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Check Netlify secrets
        id: netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Netlify secrets missing. Production deploy will be skipped."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.netlify.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.netlify.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.netlify.outputs.ready == 'true'
        run: npm ci

      - name: Build application
        if: steps.netlify.outputs.ready == 'true'
        run: npm run build

      - name: Deploy to Netlify production
        if: steps.netlify.outputs.ready == 'true'
        run: npx netlify deploy --dir=build --prod --site="$NETLIFY_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Report skipped deploy
        if: steps.netlify.outputs.ready != 'true'
        run: echo "Set NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID in GitHub Secrets to enable automatic Netlify deploys."
